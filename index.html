<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BB-8 Demo</title>

<style>
:root{
  --orange:#FF7A1A;
  --orange-light:#FFB26B;
  --blue:#3EA6FF;
  --silver:#C0C6CF;
  --bg:#0F172A;
  --text:#F8FAFC;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

.container{
max-width:1100px;
margin:0 auto;
padding:0 20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
border-bottom:3px solid var(--orange);
}

.logo span{
color:var(--orange);
}

nav a{
margin-left:20px;
text-decoration:none;
color:inherit;
font-weight:600;
}

nav a:hover{
color:var(--orange);
}

.themeButton{
background:var(--orange);
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

.hero{
text-align:center;
padding:80px 0;
}

.hero h1{
color:var(--orange);
font-size:42px;
}

.cta{
background:var(--orange);
border:none;
padding:14px 30px;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:20px;
}

.cta:hover{
background:var(--orange-light);
}

.services{
display:flex;
justify-content:center;
gap:30px;
padding:50px 0;
flex-wrap:wrap;
}

.card{
padding:25px;
border-radius:10px;
border:2px solid var(--silver);
width:220px;
text-align:center;
background:rgba(255,122,26,0.08);
}

.blue{
color:var(--blue);
text-shadow:
0 0 8px rgba(62,166,255,0.8),
0 0 16px rgba(62,166,255,0.6),
0 0 24px rgba(62,166,255,0.4);
}

footer{
text-align:center;
padding:30px 0;
border-top:3px solid var(--orange);
}
</style>
</head>

<body>

<div class="container">

<header>
<div class="logo">🦷 Tand<span>Teknik</span></div>

<nav>
<a href="#">Hjem</a>
<a href="#">Ydelser</a>
<a href="#">Om os</a>
<a href="#">Kontakt</a>
</nav>

<select id="themeSelect"></select>
<button class="themeButton" onclick="toggleMode()">Dark/Light</button>
</header>

<section class="hero">
<h1>BB-8 Inspireret Tandteknik</h1>
<p>Moderne løsninger til dit smil</p>
<button class="cta">Book tid</button>
</section>

<section class="services">
<div class="card">
<h3 class="blue">Kroner</h3>
<p>Holdbare tandkroner</p>
</div>

<div class="card">
<h3 class="blue">Proteser</h3>
<p>Komfortable proteser</p>
</div>

<div class="card">
<h3 class="blue">Implantater</h3>
<p>Moderne implantater</p>
</div>
</section>

<footer>
<p>© Tandtekniker Demo</p>
</footer>

</div>

<script src="themes.js"></script>

<script>
const select = document.getElementById("themeSelect");

let currentTheme = "bb8";
let currentMode = "dark";

// 🔽 Lav dropdown automatisk
for (const key in themes) {
  const option = document.createElement("option");
  option.value = key;
  option.textContent = themes[key].name;
  select.appendChild(option);
}

// 🎨 Apply theme
function applyTheme() {
  const theme = themes[currentTheme][currentMode];

  // map cherry → standard variabler
  const mappedTheme = {};

  for (const key in theme) {
    let newKey = key;

    if (key === "--cherry") newKey = "--orange";
    if (key === "--cherry-soft") newKey = "--orange-light";
    if (key === "--green") newKey = "--silver";

    mappedTheme[newKey] = theme[key];
  }

  // apply
  for (const variable in mappedTheme) {
    document.documentElement.style.setProperty(variable, mappedTheme[variable]);
  }
}

// start
applyTheme();
</script>

</body>
</html>
